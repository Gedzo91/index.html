<html>
<head>
    <title>AI Skybox Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="container">
        <div class="title-screen" id="titleScreen">
            <h1>Go Literally Anywhere</h1>
            <div>
                <button id="startBtn"><i class="fas fa-rocket"></i> Explore</button>
                <button id="titleMobileBtn" class="mobile-mode-btn"><i class="fas fa-desktop"></i></button>
            </div>
        </div>

        <div class="controls" id="controls" style="display:none;">
            <input type="text" id="prompt" placeholder="Describe a location (real or imaginary)..." value="misty mountain peak">
            <button id="generateBtn"><i class="fas fa-compass"></i> Generate</button>
            <button id="randomBtn"><i class="fas fa-dice"></i> Random</button>
        </div>

        <div id="viewport" style="display:none;"></div>
        
        <div class="loading" id="loadingScreen">
            <div class="spinner"></div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.min.js",
          "three/examples/jsm/controls/OrbitControls": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/controls/OrbitControls.js"
        }
      }
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
